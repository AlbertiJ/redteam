<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RedTeam Lab v3.1 — Dashboard de Auditoría</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 20px;
  }
  header {
    background: linear-gradient(135deg, #161b22 0%, #21262d 100%);
    border: 1px solid #30363d;
    padding: 24px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  h1 { color: #58a6ff; font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: #8b949e; font-size: 14px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
  }
  .card .num { font-size: 36px; font-weight: bold; margin: 8px 0; }
  .card .label { color: #8b949e; font-size: 12px; text-transform: uppercase; }
  .critico { color: #f85149; }
  .alto { color: #ff7b72; }
  .medio { color: #d29922; }
  .bajo { color: #3fb950; }
  .shadow { color: #d2a8ff; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
  }
  th { background: #21262d; text-align: left; padding: 12px; color: #58a6ff; }
  td { padding: 10px 12px; border-top: 1px solid #21262d; }
  tr:hover { background: #1c2128; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
  }
  .badge.SWAGGER { background: #1f6feb; color: white; }
  .badge.SHADOW { background: #8957e5; color: white; }
  .badge.CRITICO { background: #f85149; color: white; }
  .badge.ALTO { background: #db6d28; color: white; }
  .badge.MEDIO { background: #d29922; color: black; }
  .badge.BAJO { background: #238636; color: white; }
  .badge.INFO { background: #6e7681; color: white; }
  .method {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 11px;
    font-weight: bold;
  }
  .method.GET { background: #1f6feb; }
  .method.POST { background: #238636; }
  .status {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 11px;
  }
  .status.s2xx { background: #238636; }
  .status.s4xx { background: #d29922; color: black; }
  .status.s5xx { background: #f85149; }
  code { background: #0d1117; padding: 2px 6px; border-radius: 3px; color: #79c0ff; }
  #refresh { 
    background: #238636; color: white; border: none; padding: 8px 16px; 
    border-radius: 6px; cursor: pointer; margin-bottom: 16px; font-size: 14px;
  }
  #refresh:hover { background: #2ea043; }
  .empty { padding: 40px; text-align: center; color: #8b949e; }
</style>
</head>
<body>
<header>
  <h1>🛰️  RedTeam Lab v3.1 — Dashboard de Auditoría</h1>
  <p class="subtitle">Shadow API Detection & Information Disclosure</p>
  <p class="subtitle" id="updated"></p>
</header>

<button id="refresh" onclick="cargar()">🔄 Recargar hallazgos</button>

<div class="grid" id="stats"></div>

<h2 style="color: #58a6ff; margin-bottom: 12px;">📋 Hallazgos detallados</h2>
<table>
  <thead>
    <tr>
      <th>Timestamp</th>
      <th>Endpoint</th>
      <th>Método</th>
      <th>Status</th>
      <th>Doc?</th>
      <th>Categoría</th>
      <th>Severidad</th>
      <th>Detalle</th>
    </tr>
  </thead>
  <tbody id="tbody">
    <tr><td colspan="8" class="empty">Cargando...</td></tr>
  </tbody>
</table>

<script>
// RedTeam expone sus datos vía un endpoint server-side. Como alternativa
// liviana, los hallazgos se leen de un JSON estático que regenera el script.
async function cargar() {
  try {
    const r = await fetch('hallazgos.json?v=' + Date.now());
    if (!r.ok) throw new Error('Sin hallazgos.json');
    const data = await r.json();
    render(data);
  } catch (e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="8" class="empty">⚠️  No se encontró <code>hallazgos.json</code>.<br>
       Primero corré <code>python export_json.py</code> para exportar la BD.</td></tr>`;
    document.getElementById('updated').textContent = 'Sin datos';
  }
}

function render(data) {
  const h = data.hallazgos || [];
  const resumen = data.resumen || [];
  document.getElementById('updated').textContent = 'Última actualización: ' + new Date().toLocaleString();

  const total = h.length;
  const shadows = h.filter(x => !x.en_swagger).length;
  const criticos = h.filter(x => x.severidad === 'CRITICO').length;
  const altos = h.filter(x => x.severidad === 'ALTO').length;
  const medios = h.filter(x => x.severidad === 'MEDIO').length;

  document.getElementById('stats').innerHTML = `
    <div class="card"><div class="label">Total hallazgos</div><div class="num">${total}</div></div>
    <div class="card"><div class="label shadow">Shadow APIs</div><div class="num shadow">${shadows}</div></div>
    <div class="card"><div class="label critico">Críticos</div><div class="num critico">${criticos}</div></div>
    <div class="card"><div class="label alto">Altos</div><div class="num alto">${altos}</div></div>
    <div class="card"><div class="label medio">Medios</div><div class="num medio">${medios}</div></div>
  `;

  const tbody = document.getElementById('tbody');
  if (h.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">Sin hallazgos. Corré discovery.py primero.</td></tr>';
    return;
  }
  tbody.innerHTML = h.map(x => {
    const statusClass = x.status_code >= 500 ? 's5xx' : x.status_code >= 400 ? 's4xx' : 's2xx';
    const docBadge = x.en_swagger ? '<span class="badge SWAGGER">SWAGGER</span>' : '<span class="badge SHADOW">🕵️ SHADOW</span>';
    return `
      <tr>
        <td><small>${(x.timestamp || '').substring(11, 19)}</small></td>
        <td><code>${x.endpoint}</code></td>
        <td><span class="method ${x.metodo}">${x.metodo}</span></td>
        <td><span class="status ${statusClass}">${x.status_code}</span></td>
        <td>${docBadge}</td>
        <td>${x.categoria}</td>
        <td><span class="badge ${x.severidad}">${x.severidad}</span></td>
        <td><small>${x.detalle || ''}</small></td>
      </tr>
    `;
  }).join('');
}

cargar();
setInterval(cargar, 5000);
</script>
</body>
</html>
